<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>4v4 コマンドバトル</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>4v4 コマンドバトル</h1>
      <button id="restartBtn" class="small">リスタート</button>
    </header>

    <section class="battlefield">
      <div>
        <h2>味方</h2>
        <div id="allyArea" class="unit-list"></div>
      </div>

      <div class="center-panel">
        <div id="turnInfo" class="turn-info"></div>
        <div id="status" class="status"></div>
        <div id="log" class="log" aria-live="polite"></div>
      </div>

      <div>
        <h2>敵</h2>
        <div id="enemyArea" class="unit-list"></div>
      </div>
    </section>

    <section class="commands">
      <h2 id="commandTitle">コマンド</h2>
      <div id="skillButtons" class="skill-buttons"></div>
      <p id="targetHint" class="hint"></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
